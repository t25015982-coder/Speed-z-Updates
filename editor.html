<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>speed-E Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;overflow:hidden}
#container{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
<script>
require.config({paths:{vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs"}});
require(["vs/editor/editor.main"],function(){
monaco.editor.defineTheme("speedE",{
base:"vs-dark",
inherit:true,
rules:[
{token:"comment",foreground:"6A9955",fontStyle:"italic"},
{token:"keyword",foreground:"EC4899",fontStyle:"bold"},
{token:"identifier",foreground:"9CDCFE"},
{token:"string",foreground:"CE9178"},
{token:"number",foreground:"B5CEA8"},
{token:"function",foreground:"DCDCAA"}
],
colors:{
"editor.background":"#0D0D14",
"editor.foreground":"#E2E2E8",
"editor.lineHighlightBackground":"#1A1A2E",
"editorCursor.foreground":"#EC4899",
"editorLineNumber.foreground":"#6B6B7D",
"editorLineNumber.activeForeground":"#EC4899"
}
});
window.editor=monaco.editor.create(document.getElementById("container"),{
value:"-- speed-E Executor\nprint(\"Hello, World!\")",
language:"lua",
theme:"speedE",
fontFamily:"JetBrains Mono, Consolas, monospace",
fontSize:13,
minimap:{enabled:true},
lineNumbers:"on",
roundedSelection:true,
scrollBeyondLastLine:false,
automaticLayout:true,
padding:{top:16},
renderLineHighlight:"all",
matchBrackets:"always",
tabSize:4,
insertSpaces:true,
wordWrap:"on"
});
window.getEditorValue=function(){return window.editor.getValue()};
window.setEditorValue=function(v){window.editor.setValue(v)};
});
</script>
</body>
</html>
